# Admin portal + Bull Board location. ONE host fronts the admin-service on :3002:
# the dashboard (/admin/dashboard), Bull Board (/admin/queues), the stats API, and
# the first-run /admin/setup page. Bodies are tiny (login / JSON actions).
#
# IMPORTANT: this deliberately does NOT include snippets/bundler-headers.conf —
# that sets permissive CORS (Access-Control-Allow-Origin *), which must never be
# exposed on the admin surface. Admin is same-origin, so we set strict security
# headers here instead (these are inherited by the proxy location, which sets no
# add_header of its own — nginx add_header inheritance is replace-not-merge).
add_header 'Strict-Transport-Security' 'max-age=63072000' always;
add_header 'X-Frame-Options'           'DENY' always;        # no framing the admin UI
add_header 'X-Content-Type-Options'    'nosniff' always;
add_header 'Referrer-Policy'           'same-origin' always;

client_max_body_size 2M;

# Bare host → the dashboard.
location = / {
    return 302 /admin/dashboard;
}

location /admin/ {
    proxy_pass http://bundler_admin;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;  # app: ADMIN_TRUST_PROXY=true
    proxy_set_header X-Forwarded-Proto $scheme;                     # app: ADMIN_COOKIE_SECURE=true
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
}

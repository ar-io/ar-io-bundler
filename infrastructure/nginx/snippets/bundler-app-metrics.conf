# App/pipeline Prometheus metrics for the upload-service, proxied over TLS.
# ------------------------------------------------------------------------
# The upload-service exposes a per-process prom-client registry on the PRIVATE
# vSwitch IP (METRICS_BIND_ADDRESS), never publicly. We surface them here on :443,
# gated by the collector CIDR allowlist (metrics-allowlist.conf). App metrics have
# no auth, so the allowlist IS the gate.
#
#   upload-workers (fork; the bundle pipeline) -> UPLOAD_WORKERS_METRICS_PORT (9311)
#   upload-api     (PM2 cluster) -> UPLOAD_API_METRICS_PORT + NODE_APP_INSTANCE (9301, 9302, ...)
# The api-N paths are distinct scrape targets; Prometheus sum()s them for the
# cluster total. Add one api-N location per additional API_INSTANCES.
#
# NOTE: upstream host is the box's PRIVATE bind IP (METRICS_BIND_ADDRESS) — per deploy.
location = /upload-metrics/workers {
    include snippets/metrics-allowlist.conf;
    proxy_pass http://10.84.0.90:9311/metrics;
}
location = /upload-metrics/api-0 {
    include snippets/metrics-allowlist.conf;
    proxy_pass http://10.84.0.90:9301/metrics;
}
location = /upload-metrics/api-1 {
    include snippets/metrics-allowlist.conf;
    proxy_pass http://10.84.0.90:9302/metrics;
}

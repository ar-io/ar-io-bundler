# Dedicated PAYMENT endpoint location. Small bodies, buffered request (helps POST),
# short timeouts. Does NOT override Content-Type — overriding it breaks payment POST
# body parsing (learned the hard way).
client_max_body_size 10M;
client_body_buffer_size 128k;

location / {
    proxy_pass http://bundler_payment;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_request_buffering on;
    proxy_buffering off;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
}

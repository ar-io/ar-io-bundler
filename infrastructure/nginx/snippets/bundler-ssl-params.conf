# Shared TLS params — included by every bundler server block.
# Replaces certbot's options-ssl-nginx.conf + ssl-dhparams.pem, which `certbot
# certonly` does NOT create (only the --nginx installer does). Inlining these
# removes that missing-file dependency. Per-server ssl_certificate/
# ssl_certificate_key stay in the server block so different URLs/domains can use
# different certs. (Mozilla "intermediate" profile.)
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_session_cache shared:bundlerSSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# UNIFIED endpoint — path-muxed: explicit PAYMENT prefixes -> bundler_payment;
# everything else (default, incl. /, /info, /health, /tx, /chunks, /x402/upload)
# -> bundler_upload. nginx picks the LONGEST matching prefix, so the upload x402
# overrides correctly win over the broader /v1/price/ and /v1/x402/ payment prefixes.
#
# /info & /v1/info resolve to UPLOAD (root->upload, confirmed). Flip the default
# `location /` to bundler_payment if a client ever needs payment's /v1/info.
client_max_body_size 100M;

# Common proxy headers — inherited by the payment locations and the GET upload
# overrides (which set NO proxy_set_header of their own). The POST upload locations
# re-declare all headers because they add Content-Type (add resets inheritance).
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection        "";

# ---- PAYMENT prefixes -> :4001 (inherit headers; NO Content-Type; buffered) ----
location /v1/balance          { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/account/         { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/price/           { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/rates            { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/currencies       { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/countries        { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/redeem           { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/reserve-balance/ { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/refund-balance/  { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/check-balance/   { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/x402/            { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/arns/            { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /v1/stripe-webhook   { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /account/balance     { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
location /price/              { proxy_pass http://bundler_payment; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }

# ---- UPLOAD x402 overrides under payment prefixes (longer prefix wins) ----
# pricing (GET, no body -> inherit headers):
location /v1/price/x402/ { proxy_pass http://bundler_upload; proxy_buffering off; proxy_read_timeout 300s; }
location /price/x402/    { proxy_pass http://bundler_upload; proxy_buffering off; proxy_read_timeout 300s; }
# uploads (POST -> need Content-Type + stream; re-declare all headers):
location /v1/x402/upload/    { proxy_pass http://bundler_upload; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Content-Type $content_type; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_buffering off; proxy_request_buffering off; proxy_read_timeout 300s; proxy_send_timeout 300s; }
location /v1/x402/data-item/ { proxy_pass http://bundler_upload; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Content-Type $content_type; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_buffering off; proxy_request_buffering off; proxy_read_timeout 300s; proxy_send_timeout 300s; }

# ---- DEFAULT -> upload :3001 (/, /info, /health, /tx, /chunks, /x402/upload, /bundler_metrics) ----
location / {
    proxy_pass http://bundler_upload;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type      $content_type;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
}

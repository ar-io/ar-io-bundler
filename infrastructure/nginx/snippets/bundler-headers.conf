# CORS + HSTS + preflight — included (server context) by every bundler server block.
# Backends have their cors middleware DISABLED ("CORS handled by nginx"), so these
# are the ONLY CORS headers — no duplication. `always` applies them to error
# responses too. Locations below must NOT set their own add_header, or they lose
# these (nginx add_header inheritance is replace-not-merge).
add_header 'Access-Control-Allow-Origin'   '*' always;
add_header 'Access-Control-Allow-Methods'  'GET, POST, OPTIONS' always;
add_header 'Access-Control-Allow-Headers'  '*' always;
add_header 'Access-Control-Expose-Headers' '*' always;
add_header 'Strict-Transport-Security'     'max-age=63072000' always;

# CORS preflight short-circuit. `return` is one of the only directives safe inside
# `if` (no "if is evil" pitfall). The add_header lines above (always) attach the
# CORS headers to this 204.
if ($request_method = 'OPTIONS') { return 204; }

# Dedicated UPLOAD endpoint location. Streams uploads (no buffering), passes
# Content-Type through, generous timeouts. Body cap 2100m (~2.05 GiB) sits just
# above MAX_DATA_ITEM_SIZE (2 GiB) so the app (the real size guard) returns the 413.
# Keep this >= MAX_DATA_ITEM_SIZE or nginx will 413 uploads the service would accept.
client_max_body_size 2100m;

location / {
    proxy_pass http://bundler_upload;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type      $content_type;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
}

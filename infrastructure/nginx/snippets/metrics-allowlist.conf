# Metrics-scraper allowlist — matches the ufw CIDR policy for Prometheus/OTel
# collectors. Included inside each metrics location (see bundler-metrics.conf).
# Keep in sync with ufw and the infra collector egress IPs.
allow 127.0.0.1;          # on-box self-checks
allow 100.64.0.0/10;      # Tailscale tailnet (CGNAT range) — admin scraping from local
allow 34.205.91.20;       # collector egress
allow 34.192.58.42;       # collector egress
allow 54.166.111.219;     # collector egress
deny all;

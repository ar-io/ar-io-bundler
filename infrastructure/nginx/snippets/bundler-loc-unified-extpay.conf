# UNIFIED endpoint for turbo.ardrive.io during the ardrive.io cutover — path-muxed:
#   PAYMENT prefixes  -> EXTERNAL payment.ardrive.io (AWS CloudFront)   [local payment svc is idle]
#   everything else   -> LOCAL  bundler_upload :3001  (/, /info, /tx, /chunks, /x402/upload, ...)
#
# Mirrors bundler-loc-unified.conf, EXCEPT payment locations proxy to AWS (via
# bundler-extpay.conf) instead of bundler_payment :4001. This lets turbo.ardrive.io
# move here before the local payment service is ready: uploads run locally, payments
# pass straight back to the still-authoritative AWS payment service. nginx picks the
# LONGEST matching prefix, so the upload x402 overrides still win over the broader
# /v1/price/ and /v1/x402/ payment prefixes.
client_max_body_size 100M;

# CloudFront IPs rotate — re-resolve at runtime via the systemd-resolved stub.
# ipv6 off to force the A records validated against payment.ardrive.io.
resolver 127.0.0.53 valid=30s ipv6=off;

# Common proxy headers for the LOCAL upload locations (GET overrides + default `/`).
# Payment locations re-declare their own headers in bundler-extpay.conf (setting
# Host there breaks inheritance), so this block effectively serves the upload paths.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection        "";

# ---- PAYMENT prefixes -> EXTERNAL payment.ardrive.io (AWS) ----
location /v1/balance          { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/account/         { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/price/           { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/rates            { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/currencies       { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/countries        { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/redeem           { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/reserve-balance/ { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/refund-balance/  { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/check-balance/   { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/x402/            { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/arns/            { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/stripe-webhook   { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /v1/top-up/          { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
# root-form (no /v1) payment routes — ONLY those the ArDrive API actually serves at
# root (confirmed direct vs AWS payment.ardrive.io 2026-06-26): /account/*, /price/*,
# /x402/top-up are REAL; rates/balance/redeem/currencies/countries/top-up are /v1-ONLY
# (404 at root on AWS too), so we don't add them. Upload owns none of these prefixes.
location /account/            { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /price/              { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }
location /x402/top-up         { set $pay payment.ardrive.io; proxy_pass https://$pay$request_uri; include snippets/bundler-extpay.conf; }

# ---- UPLOAD x402 overrides under payment prefixes (longer prefix wins) -> LOCAL ----
# pricing (GET, no body -> inherit headers):
location /v1/price/x402/ { proxy_pass http://bundler_upload; proxy_buffering off; proxy_read_timeout 300s; }
location /price/x402/    { proxy_pass http://bundler_upload; proxy_buffering off; proxy_read_timeout 300s; }
# uploads (POST -> need Content-Type + stream; re-declare all headers):
location /v1/x402/upload/    { proxy_pass http://bundler_upload; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Content-Type $content_type; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_buffering off; proxy_request_buffering off; proxy_read_timeout 300s; proxy_send_timeout 300s; }
location /v1/x402/data-item/ { proxy_pass http://bundler_upload; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Content-Type $content_type; proxy_http_version 1.1; proxy_set_header Connection ""; proxy_buffering off; proxy_request_buffering off; proxy_read_timeout 300s; proxy_send_timeout 300s; }

# ---- DEFAULT -> upload :3001 (/, /info, /health, /tx, /chunks, /x402/upload, /bundler_metrics) ----
location / {
    proxy_pass http://bundler_upload;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type      $content_type;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
}

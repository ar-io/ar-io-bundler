# Shared directives for turbo.ardrive.io PAYMENT locations that proxy to the
# EXTERNAL AWS payment.ardrive.io (CloudFront) during cutover, while THIS box's
# local payment service (:4001) stays idle. Included inside each payment location
# of bundler-loc-unified-extpay.conf, AFTER its
#   set $pay payment.ardrive.io;  proxy_pass https://$pay$request_uri;
#
# Host + SNI MUST be payment.ardrive.io or CloudFront 403s (it host-routes on both).
# Because we set proxy_set_header Host here, this location does NOT inherit the
# server-level proxy_set_header block — so ALL forwarding headers are re-declared.
proxy_http_version 1.1;
proxy_set_header Host              payment.ardrive.io;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection        "";

# Correct SNI to CloudFront (else TLS handshake gets the wrong/empty cert).
proxy_ssl_server_name on;
proxy_ssl_name        payment.ardrive.io;

# Verify the upstream (CloudFront) cert chains to a public CA — payment hop, so
# authenticate it. Chain confirmed valid against the system bundle 2026-06-26.
proxy_ssl_verify              on;
proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
proxy_ssl_verify_depth        3;

# nginx is the SINGLE CORS authority (bundler-headers.conf adds '*'). AWS payment
# also returns Access-Control-Allow-Origin: * — strip the upstream's so browsers
# never see duplicate ACAO (which they reject). Verified AWS sets these 2026-06-26.
proxy_hide_header Access-Control-Allow-Origin;
proxy_hide_header Access-Control-Allow-Methods;
proxy_hide_header Access-Control-Allow-Headers;
proxy_hide_header Access-Control-Expose-Headers;
proxy_hide_header Access-Control-Max-Age;

# Small buffered bodies, short timeouts (payment API contract; mirrors :4001 path).
proxy_request_buffering on;
proxy_buffering         off;
proxy_connect_timeout   60s;
proxy_send_timeout      60s;
proxy_read_timeout      60s;

# Prometheus scrape endpoints for the two-tier MinIO, proxied over TLS.
# ----------------------------------------------------------------------
# MinIO binds its metrics to the private net only, so we surface them here on
# :443, restricted to the collector/admin CIDRs (snippets/metrics-allowlist.conf)
# AND gated by the MinIO Prometheus bearer token (auth_type=jwt, the default).
# The client supplies `Authorization: Bearer <token>`; nginx forwards it to MinIO
# unchanged. A single token authenticates both tiers (shared root secret key).
#
# Generate the token:  mc admin prometheus generate <alias> cluster
# Scrape paths (scheme https):
#   /minio-metrics/ssd/cluster   -> SSD hot     tier
#   /minio-metrics/hdd/cluster   -> HDD archive tier
# (also /node, /bucket, /resource under the same prefixes)
#
# NOTE: the upstream IPs/ports below are the MinIO private-net bind address
# (MINIO_S3_BIND_IP:9000 SSD, :9002 HDD archive). Adjust per deployment.

location /minio-metrics/ssd/ {
    include snippets/metrics-allowlist.conf;
    proxy_pass http://10.83.0.4:9000/minio/v2/metrics/;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 30s;
}

location /minio-metrics/hdd/ {
    include snippets/metrics-allowlist.conf;
    proxy_pass http://10.83.0.4:9002/minio/v2/metrics/;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 30s;
}

# ar-io-bundler — nginx reverse proxy
# ====================================
# Three roles, each reusable on ANY hostname:
#   upload-service  (:3001)  — dedicated upload endpoint
#   payment-service (:4001)  — dedicated payment endpoint
#   UNIFIED                  — one host path-muxed to both (default->upload, payment prefixes->payment)
#
# Prod (ardrive.io): turbo.ardrive.io = unified, upload.ardrive.io, payment.ardrive.io.
#
# ---- HOW TO USE OTHER URLs --------------------------------------------------------
#   * Change `server_name` in the relevant block (list several names on one block,
#     or copy a block). All routing/TLS/CORS logic lives in snippets/, so a new URL
#     is just a thin server block + its cert.
#   * `ssl_certificate*` is per-server (so different domains can use different certs).
#   * Backend address is in ONE place — the two `upstream` blocks below. For a
#     DEV/TEST separate nginx router, change 127.0.0.1 to the bundler's private IP
#     (and open the bundler firewall for :3001/:4001 from the router IP only).
#   * Copy infrastructure/nginx/snippets/* to /etc/nginx/snippets/ on the box.
# ----------------------------------------------------------------------------------
# Certs: one Let's Encrypt SAN cert covers all three names (runbook §14):
#   certbot certonly --webroot -w /var/www/certbot \
#     -d turbo.ardrive.io -d upload.ardrive.io -d payment.ardrive.io \
#     --deploy-hook "systemctl reload nginx"

upstream bundler_upload  { server 127.0.0.1:3001; keepalive 32; }
upstream bundler_payment { server 127.0.0.1:4001; keepalive 32; }
upstream bundler_admin   { server 127.0.0.1:3002; keepalive 16; }  # admin-service (dashboard + Bull Board)

# ---- HTTP :80 → ACME challenge + redirect (add every hostname you serve) ----
server {
    listen 80;
    listen [::]:80;
    server_name turbo.ardrive.io upload.ardrive.io payment.ardrive.io;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---- UNIFIED endpoint ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name turbo.ardrive.io;

    ssl_certificate     /etc/letsencrypt/live/turbo.ardrive.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turbo.ardrive.io/privkey.pem;
    include snippets/bundler-ssl-params.conf;
    include snippets/bundler-headers.conf;
    include snippets/bundler-loc-unified.conf;
    include snippets/bundler-metrics.conf;       # MinIO scrape endpoints (allowlisted)
    include snippets/bundler-app-metrics.conf;   # upload-service app/pipeline metrics (allowlisted)
}

# ---- Dedicated UPLOAD endpoint ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name upload.ardrive.io;

    ssl_certificate     /etc/letsencrypt/live/turbo.ardrive.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turbo.ardrive.io/privkey.pem;
    include snippets/bundler-ssl-params.conf;
    include snippets/bundler-headers.conf;
    include snippets/bundler-loc-upload.conf;
}

# ---- Dedicated PAYMENT endpoint ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payment.ardrive.io;

    ssl_certificate     /etc/letsencrypt/live/turbo.ardrive.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turbo.ardrive.io/privkey.pem;
    include snippets/bundler-ssl-params.conf;
    include snippets/bundler-headers.conf;
    include snippets/bundler-loc-payment.conf;
}

# ---- Admin portal + Bull Board (IP-RESTRICTED — admin-only over HTTPS) -------
# Single host fronts the admin-service on :3002: dashboard (/admin/dashboard) AND
# Bull Board (/admin/queues). This is the ONLY admin block exposed over TLS — and
# it is locked to operator IPs as defense-in-depth ON TOP of the dashboard login.
#
# Prereqs on the bundler box (see runbook §14a):
#   * BIND_ADDRESS=127.0.0.1  (admin-service binds loopback; only nginx reaches it)
#     and firewall :3002 so it is never on a public/LAN interface.
#   * ADMIN_COOKIE_SECURE=true and ADMIN_TRUST_PROXY=true in .env.
#   * Do the first-run /admin/setup over the HTTPS URL (so the Secure cookie sticks).

# HTTP :80 for the admin host → serves the Let's Encrypt ACME challenge (keep it
# publicly reachable for per-host cert issuance + renewal) and redirects the rest.
server {
    listen 80;
    listen [::]:80;
    server_name admin.services.perma.online;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }  # public, for ACME only
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.services.perma.online;

    # Defense-in-depth: only operators reach it, even before the login form.
    allow 10.0.0.0/8;          # private vSwitch / VPN range
    # allow 203.0.113.10;      # <- add each operator/office public IP, then:
    deny  all;

    # Per-host Let's Encrypt cert (issued via the :80 ACME block above — runbook §14a).
    ssl_certificate     /etc/letsencrypt/live/admin.services.perma.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.services.perma.online/privkey.pem;
    include snippets/bundler-ssl-params.conf;
    include snippets/bundler-loc-admin.conf;   # NOT bundler-headers (no CORS * on admin)
}

# NOTE: MinIO console (:9001) and Prometheus (:9090) remain admin-only with NO
# public/TLS block — reach them over the VPN/SSH tunnel.

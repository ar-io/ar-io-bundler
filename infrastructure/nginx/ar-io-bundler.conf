# ar-io-bundler — nginx reverse-proxy config
# ===========================================
# PROD / Hetzner: nginx runs ON THE BUNDLER BOX → proxy_pass to 127.0.0.1.
#   So the bundler's :3001/:4001 stay localhost-only (firewall per runbook §2);
#   the public edge is this box's :443.
# DEV / TEST: nginx is a SEPARATE router → change the two proxy_pass targets to the
#   bundler's private IP (e.g. http://192.168.2.253:3001) and open the bundler
#   firewall for :3001/:4001 FROM the router IP only.
#
# Derived from the proven perma.online / vilenarios.com router config. Replace <domain>.
# TLS: TLS terminates here; the bundler trusts X-Forwarded-Proto, so the bundler's
# UPLOAD_SERVICE_PUBLIC_URL stays the public https URL. Certs via Let's Encrypt
# (single SAN cert for both names — see runbook §14).

# --- HTTP :80 → ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name upload.<domain> payment.<domain>;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- Upload API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name upload.<domain>;

    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Browser dapp clients need CORS. (Open policy — tighten Allow-Origin if you can.)
    add_header 'Access-Control-Allow-Origin'   '*' always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'  '*' always;
    add_header 'Access-Control-Expose-Headers' '*' always;

    # Body size: 100M matches the bundler's multipart threshold — the Turbo SDK
    # chunks large uploads into small multipart parts, so single requests stay
    # under this. Raise ONLY if you accept single-request data items larger than 100M.
    client_max_body_size 100M;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:3001;        # DEV: http://<bundler-private-ip>:3001
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type      $content_type;   # upload path relies on this
        proxy_http_version 1.1;
        proxy_set_header Connection "";          # upstream keepalive

        # Stream uploads straight through — do NOT buffer to disk.
        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

# --- Payment API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payment.<domain>;

    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header 'Access-Control-Allow-Origin'   '*' always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'  '*' always;
    add_header 'Access-Control-Expose-Headers' '*' always;

    client_max_body_size  10M;
    client_body_buffer_size 128k;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:4001;        # DEV: http://<bundler-private-ip>:4001
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do NOT set Content-Type here — nginx passes it through; overriding it
        # breaks payment POST body parsing (learned the hard way).
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Payment has small bodies: buffer the request (helps POST), no response buffering.
        proxy_request_buffering on;
        proxy_buffering         off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# NOTE: no public server block for Bull Board (:3002), MinIO console (:9001), or
# Prometheus (:9090) — admin-only (VPN/SSH tunnel).

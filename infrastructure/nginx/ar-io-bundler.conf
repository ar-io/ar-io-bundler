# ar-io-bundler — nginx reverse-proxy config (runs on the SEPARATE nginx router box)
# =================================================================================
# Topology: [Internet] --TLS--> [nginx router] --plain HTTP over private net--> [bundler box]
# TLS terminates here. The bundler sees plain HTTP from this router and trusts
# X-Forwarded-Proto, so UPLOAD_SERVICE_PUBLIC_URL on the bundler stays the public https URL.
#
# Before this works:
#   1. DNS: upload.<domain> + payment.<domain> -> this router's public IP.
#   2. Firewall: this router can reach the bundler's private IP on :3001 and :4001
#      (bundler firewall allows those ports FROM this router's IP only — never public).
#   3. Certs (Let's Encrypt, single SAN cert for both names):
#        certbot certonly --webroot -w /var/www/certbot \
#          -d upload.<domain> -d payment.<domain>
#      Auto-renew is installed as a systemd timer; verify: certbot renew --dry-run
#      (reload nginx on renew: add `--deploy-hook "systemctl reload nginx"`).
#   4. ⚠️ If <domain> is on Cloudflare, keep upload.<domain> DNS-only (grey cloud):
#      CF's proxy caps request bodies at 100 MB on Free/Pro/Business and will break
#      10 GiB uploads. payment.<domain> may be proxied (no large bodies).
#
# Replace the two placeholders: BUNDLER_PRIVATE_IP and <domain>.

upstream bundler_upload {
    server BUNDLER_PRIVATE_IP:3001;
    keepalive 32;
    # For HA later: add more `server ...:3001;` lines here — this is where the
    # single-node reverse proxy becomes a real load balancer.
}

upstream bundler_payment {
    server BUNDLER_PRIVATE_IP:4001;
    keepalive 32;
}

# ---- HTTP :80 — ACME challenge + redirect everything else to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name upload.<domain> payment.<domain>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;          # certbot --webroot path
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Upload API (large uploads up to 10 GiB) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;          # nginx >=1.25.1: use `listen 443 ssl;` + `http2 on;`
    server_name upload.<domain>;

    # One SAN cert covers both subdomains; live dir is named after the first -d.
    ssl_certificate     /etc/letsencrypt/live/upload.<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/upload.<domain>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;   # Mozilla-intermediate, TLS1.2/1.3
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    server_tokens off;

    # --- large-upload tuning (the part that bites if omitted) ---
    client_max_body_size 11G;           # MAX_DATA_ITEM_SIZE is 10 GiB; headroom for ANS-104 overhead
    client_body_timeout  600s;
    proxy_request_buffering off;        # STREAM the upload to the bundler; do NOT buffer 10 GiB to disk
    proxy_http_version   1.1;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_connect_timeout 75s;

    location / {
        proxy_pass http://bundler_upload;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";     # enable upstream keepalive
    }
}

# ---- Payment API (no large bodies) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payment.<domain>;

    ssl_certificate     /etc/letsencrypt/live/upload.<domain>/fullchain.pem;   # same SAN cert
    ssl_certificate_key /etc/letsencrypt/live/upload.<domain>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    server_tokens off;

    client_max_body_size 1M;
    proxy_http_version   1.1;
    proxy_read_timeout   60s;
    proxy_connect_timeout 75s;

    location / {
        proxy_pass http://bundler_payment;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}

# NOTE: do NOT add public server blocks for Bull Board (:3002), the MinIO console
# (:9001), or Prometheus (:9090). Those stay admin-only (VPN/SSH tunnel / private).

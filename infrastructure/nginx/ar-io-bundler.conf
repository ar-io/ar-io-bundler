# ar-io-bundler — nginx reverse-proxy config
# ===========================================
# PROD endpoints (ardrive.io):
#   upload.ardrive.io   -> upload-service  :3001
#   payment.ardrive.io  -> payment-service :4001
#   turbo.ardrive.io    -> UNIFIED: path-muxed to both (default -> upload, payment prefixes -> payment)
#
# PROD/Hetzner: nginx is CO-LOCATED on the bundler box -> proxy_pass 127.0.0.1
#   (bundler :3001/:4001 stay localhost-only, firewall per runbook §2; public edge = :443).
# DEV/TEST: separate nginx router -> change every 127.0.0.1 below to the bundler's private IP
#   and open the bundler firewall for :3001/:4001 FROM the router IP only.
#
# TLS terminates here; the bundler trusts X-Forwarded-Proto, so UPLOAD_SERVICE_PUBLIC_URL
# stays the public https URL. One Let's Encrypt SAN cert covers all three names (runbook §14):
#   certbot certonly --webroot -w /var/www/certbot \
#     -d turbo.ardrive.io -d upload.ardrive.io -d payment.ardrive.io \
#     --deploy-hook "systemctl reload nginx"

# ---- HTTP :80 → ACME challenge + redirect all three to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name turbo.ardrive.io upload.ardrive.io payment.ardrive.io;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# =====================================================================
# Dedicated UPLOAD endpoint
# =====================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name upload.ardrive.io;

    ssl_certificate     /etc/letsencrypt/live/turbo.ardrive.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turbo.ardrive.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header 'Access-Control-Allow-Origin'   '*' always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'  '*' always;
    add_header 'Access-Control-Expose-Headers' '*' always;
    if ($request_method = 'OPTIONS') { return 204; }

    client_max_body_size 100M;       # large uploads use multipart (small chunks); raise only for >100M single requests

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type      $content_type;     # upload path relies on this
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;                          # stream, don't buffer to disk
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

# =====================================================================
# Dedicated PAYMENT endpoint
# =====================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payment.ardrive.io;

    ssl_certificate     /etc/letsencrypt/live/turbo.ardrive.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turbo.ardrive.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header 'Access-Control-Allow-Origin'   '*' always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'  '*' always;
    add_header 'Access-Control-Expose-Headers' '*' always;
    if ($request_method = 'OPTIONS') { return 204; }

    client_max_body_size 10M;
    client_body_buffer_size 128k;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do NOT set Content-Type here — overriding it breaks payment POST body parsing.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# =====================================================================
# UNIFIED endpoint — path-muxed (default → upload; payment prefixes → payment)
# nginx picks the LONGEST matching location, so the upload x402 overrides below
# correctly win over the broader payment /v1/price/ and /v1/x402/ prefixes.
# =====================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name turbo.ardrive.io;

    ssl_certificate     /etc/letsencrypt/live/turbo.ardrive.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turbo.ardrive.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header 'Access-Control-Allow-Origin'   '*' always;
    add_header 'Access-Control-Allow-Methods'  'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers'  '*' always;
    add_header 'Access-Control-Expose-Headers' '*' always;
    if ($request_method = 'OPTIONS') { return 204; }

    client_max_body_size 100M;       # max of the two; payment bodies are small anyway

    # Common proxy headers — inherited by every location that does NOT set its own
    # proxy_set_header (i.e. the payment locations + the GET upload overrides).
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ---- snippet for the two PAYMENT settings reused below ----
    #   proxy_pass :4001; request_buffering on; buffering off; 60s
    # ---- and the UPLOAD-POST settings ----
    #   proxy_pass :3001; +Content-Type; request_buffering off; buffering off; 300s

    # --- PAYMENT prefixes → :4001 (inherit headers above; NO Content-Type override) ---
    location /v1/balance         { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/account/        { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/price/          { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/rates           { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/currencies      { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/countries       { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/redeem          { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/reserve-balance/ { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/refund-balance/  { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/check-balance/   { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/x402/           { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/arns/           { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /v1/stripe-webhook  { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /account/balance    { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }
    location /price/             { proxy_pass http://127.0.0.1:4001; proxy_request_buffering on; proxy_buffering off; proxy_read_timeout 60s; }

    # --- UPLOAD overrides that sit UNDER a payment prefix (longer prefix wins) ---
    # x402 pricing (GET, no body → inherit headers, terse):
    location /v1/price/x402/ { proxy_pass http://127.0.0.1:3001; proxy_buffering off; proxy_read_timeout 300s; }
    location /price/x402/    { proxy_pass http://127.0.0.1:3001; proxy_buffering off; proxy_read_timeout 300s; }
    # x402 uploads (POST → need Content-Type + stream; re-declare all headers):
    location /v1/x402/upload/    { proxy_pass http://127.0.0.1:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Content-Type $content_type; proxy_set_header Connection ""; proxy_buffering off; proxy_request_buffering off; proxy_read_timeout 300s; proxy_send_timeout 300s; }
    location /v1/x402/data-item/ { proxy_pass http://127.0.0.1:3001; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header Content-Type $content_type; proxy_set_header Connection ""; proxy_buffering off; proxy_request_buffering off; proxy_read_timeout 300s; proxy_send_timeout 300s; }

    # --- DEFAULT → upload :3001 (covers /tx, /v1/tx, /chunks, /x402/upload, /bundler_metrics, and /, /info, /health) ---
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type      $content_type;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}

# NOTE: no public server block for Bull Board (:3002), MinIO console (:9001), or
# Prometheus (:9090) — admin-only (VPN/SSH tunnel). /info & /v1/info on turbo.* resolve
# to UPLOAD (root→upload choice); flip the default location if the SDK needs payment's /v1/info.

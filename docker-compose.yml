services:
  # PostgreSQL - Both payment and upload databases
  postgres:
    image: postgres:16.1
    container_name: ar-io-bundler-postgres
    restart: unless-stopped
    # Connection-cap rule: max_connections >= (max processes with a DB pool ×
    # DB_POOL_MAX) + overhead. Processes = upload-api×API_INSTANCES +
    # payment-service×API_INSTANCES + upload-workers + payment-workers +
    # admin-dashboard. Default PG max_connections is 100, which is exceeded under
    # load (e.g. API_INSTANCES=8 → ~19 pools × DB_POOL_MAX). Re-check this number
    # whenever API_INSTANCES or DB_POOL_MAX changes.
    command: ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=256MB"]
    environment:
      POSTGRES_USER: ${DB_USER:-turbo_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Bind to localhost by default; PM2 services connect via localhost.
      # Never expose Postgres on a public interface.
      - "${INFRA_BIND_IP:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-turbo_admin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Cache (port 6379)
  redis-cache:
    image: redis:7.2-alpine
    container_name: ar-io-bundler-redis-cache
    restart: unless-stopped
    ports:
      - "${INFRA_BIND_IP:-127.0.0.1}:${REDIS_CACHE_PORT:-6379}:6379"
    command: ["redis-server"]
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Redis - Queues (port 6381)
  redis-queues:
    image: redis:7.2-alpine
    container_name: ar-io-bundler-redis-queues
    restart: unless-stopped
    ports:
      - "${INFRA_BIND_IP:-127.0.0.1}:${REDIS_QUEUE_PORT:-6381}:6381"
    command: ["redis-server", "--port", "6381"]
    volumes:
      - redis-queues-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  # MinIO - S3-compatible object storage
  minio:
    # Pinned to the known-good release validated on the dev box (was :latest).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: ar-io-bundler-minio
    restart: unless-stopped
    ports:
      # S3 API: localhost by default. For remote AR.IO gateways to pull data
      # items over the Hetzner vSwitch, set MINIO_S3_BIND_IP to the private
      # interface IP (NOT a public address). Same-host gateways use the
      # ar-io-network docker alias below and don't need this host port.
      - "${MINIO_S3_BIND_IP:-127.0.0.1}:9000:9000"
      # Console UI: admin-only, never public.
      - "${INFRA_BIND_IP:-127.0.0.1}:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin123}
      MINIO_DOMAIN: ar-io-bundler-minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
      ar-io-network:
        aliases:
          - ar-io-bundler-minio
          - raw-data-items.ar-io-bundler-minio
          - backup-data-items.ar-io-bundler-minio

  # MinIO Initialization - Create buckets
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    container_name: ar-io-bundler-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin123};
      mc mb --ignore-existing minio/raw-data-items;
      mc mb --ignore-existing minio/backup-data-items;
      mc anonymous set download minio/raw-data-items;
      mc anonymous set download minio/backup-data-items;
      echo 'MinIO buckets created successfully';
      "

volumes:
  postgres-data:
  redis-cache-data:
  redis-queues-data:
  minio-data:

networks:
  ar-io-network:
    external: true
    name: ar-io-network

# Notes:
# - Payment and upload services are managed by PM2, not docker-compose
# - AR.IO Gateway is deployed separately
# - This compose file is for infrastructure only

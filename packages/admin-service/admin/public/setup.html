<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ar.io Bundler — Set up admin access</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 260'%3E%3Crect width='400' height='260' fill='%235427C8'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Besley:wght@600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#5427C8; --lavender:#DFD6F7; --accent-lav:#D4C6FF;
      --deep-dark:#0e0a1c; --border:rgba(212,198,255,.18); --danger:#ef4444; --ok:#16a34a;
      --head:'Besley', Georgia, serif; --body:'Plus Jakarta Sans', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:var(--body); color:#fff; background:var(--deep-dark);
      background-image:
        radial-gradient(60% 50% at 50% -10%, rgba(84,39,200,.55) 0%, rgba(84,39,200,0) 60%),
        radial-gradient(40% 40% at 85% 110%, rgba(212,198,255,.18) 0%, rgba(212,198,255,0) 60%);
    }
    .card {
      width:100%; max-width:420px; margin:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 100%);
      border:1px solid var(--border); border-radius:24px; padding:36px 32px;
      box-shadow:0 30px 80px rgba(0,0,0,.5); backdrop-filter:blur(6px);
    }
    .brand { text-align:center; margin-bottom:22px; }
    .brand svg { width:104px; height:auto; }
    .brand .product { font-family:var(--head); font-weight:800; font-size:14px; color:var(--accent-lav); margin-top:10px; }
    .title { font-family:var(--head); font-weight:800; font-size:22px; letter-spacing:-.025em; text-align:center; margin-bottom:4px; }
    .subtitle { text-align:center; color:rgba(255,255,255,.6); font-size:13px; margin-bottom:22px; }
    label { display:block; font-size:13px; color:var(--accent-lav); margin:14px 0 6px; font-weight:500; }
    input {
      width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
      background:rgba(0,0,0,.25); color:#fff; font-size:14px; font-family:var(--body);
    }
    input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(84,39,200,.3); }
    .hint { font-size:12px; color:rgba(255,255,255,.45); margin-top:6px; }
    button {
      width:100%; margin-top:24px; padding:13px; border:0; border-radius:9999px; cursor:pointer;
      background:var(--primary); color:#fff; font-size:15px; font-weight:700; font-family:var(--body);
      transition:filter .15s, transform .05s;
    }
    button:hover { filter:brightness(1.08); }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .msg { display:none; margin-top:16px; padding:10px 12px; border-radius:10px; font-size:13px; }
    .msg.err { background:rgba(239,68,68,.12); border:1px solid var(--danger); color:#fecaca; }
    .foot { margin-top:18px; text-align:center; color:rgba(255,255,255,.4); font-size:12px; }
  </style>
</head>
<body>
  <form class="card" id="setup-form" autocomplete="off">
    <div class="brand">
      <svg viewBox="0 0 1296 381" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="ar.io">
        <path d="M1035.01 60.5C924.55 60.5 835.01 150.04 835.01 260.5V320.5H895.01V280.5C895.01 263.93 908.44 250.5 925.01 250.5C933.29 250.5 940.79 253.86 946.22 259.29C951.65 264.72 955.01 272.22 955.01 280.5V320.5H1015.01V300.5C1015.01 256.32 1050.83 220.5 1095.01 220.5C1139.19 220.5 1175.01 256.32 1175.01 300.5V320.5H1235.01V260.5C1235.01 150.04 1145.47 60.5 1035.01 60.5ZM925.01 220.5C908.44 220.5 895.01 207.07 895.01 190.5C895.01 173.93 908.44 160.5 925.01 160.5C941.58 160.5 955.01 173.93 955.01 190.5C955.01 207.07 941.58 220.5 925.01 220.5Z" fill="#F0F0F0"/>

        <path d="M535.02 159.49H472.87V320.5H535.02V159.49Z" fill="#F0F0F0"/>
        <path d="M504.49 80.5H503.41C485.714 80.5 471.37 94.8448 471.37 112.54C471.37 130.235 485.714 144.58 503.41 144.58H504.49C522.185 144.58 536.53 130.235 536.53 112.54C536.53 94.8448 522.185 80.5 504.49 80.5Z" fill="#F0F0F0"/>
        <path d="M764.83 117.42C784.61 142.03 794.51 171.12 794.51 204.69C794.51 238.26 784.62 268.03 764.83 292.28C745.05 316.54 715.01 328.66 674.73 328.66C634.45 328.66 604.41 316.53 584.63 292.28C564.85 268.03 554.95 238.83 554.95 204.69C554.95 170.55 564.84 142.03 584.63 117.42C604.41 92.81 634.45 80.5 674.73 80.5C715.01 80.5 745.05 92.81 764.83 117.42ZM674.51 131.93C656.59 131.93 642.79 138.22 633.11 150.82C623.44 163.41 618.6 181.37 618.6 204.7C618.6 228.03 623.44 246.03 633.11 258.69C642.79 271.35 656.58 277.68 674.51 277.68C692.44 277.68 706.19 271.35 715.8 258.69C725.4 246.03 730.21 228.04 730.21 204.7C730.21 181.36 725.4 163.41 715.8 150.82C706.19 138.23 692.43 131.93 674.51 131.93Z" fill="#F0F0F0"/>
        <path d="M423.07 320.51C439.638 320.51 453.07 307.079 453.07 290.51C453.07 273.941 439.638 260.51 423.07 260.51C406.501 260.51 393.07 273.941 393.07 290.51C393.07 307.079 406.501 320.51 423.07 320.51Z" fill="#F0F0F0"/>
      </svg>
      <div class="product">Bundler</div>
    </div>
    <div class="title">Set up admin access</div>
    <div class="subtitle">First-run setup — choose your admin credentials</div>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" value="admin" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" required>
    <div class="hint">At least 8 characters. Stored only as an Argon2id hash — never in plaintext.</div>
    <label for="confirm">Confirm password</label>
    <input id="confirm" name="confirm" type="password" autocomplete="new-password" required>
    <button id="submit" type="submit">Create admin & sign in</button>
    <div class="msg err" id="error"></div>
    <div class="foot">This page is only available until a password is set.</div>
  </form>

  <script>
    const form = document.getElementById('setup-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit');
    function showError(m) { errorEl.textContent = m; errorEl.style.display = 'block'; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirm) { showError('Passwords do not match.'); return; }

      submitBtn.disabled = true; submitBtn.textContent = 'Setting up…';
      try {
        const res = await fetch('/admin/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (res.ok) { window.location.href = '/admin/dashboard'; return; }
        const data = await res.json().catch(() => ({}));
        showError(data.error || 'Setup failed.');
      } catch (err) {
        showError('Network error. Please try again.');
      } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Create admin & sign in';
      }
    });
  </script>
</body>
</html>

services:
  upload-service:
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:-18.17.0}
        NODE_VERSION_SHORT: ${NODE_VERSION_SHORT:-18}
    environment:
      NODE_ENV: ${NODE_ENV:-local}
      DB_HOST: upload-service-pg
      DB_PORT: 5432
      DB_PASSWORD: postgres
      PAYMENT_SERVICE_BASE_URL: ${PAYMENT_SERVICE_BASE_URL:-}
      MAX_DATA_ITEM_SIZE: ${MAX_DATA_ITEM_SIZE:-10737418240}
      ALLOW_LISTED_ADDRESSES: ${ALLOW_LISTED_ADDRESSES:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      ELASTICACHE_HOST: ${ELASTICACHE_HOST:-redis}
      ELASTICACHE_NO_CLUSTERING: ${ELASTICACHE_NO_CLUSTERING:-true}
      REDIS_HOST: ${REDIS_HOST:-redis-queues}
      REDIS_PORT_QUEUES: ${REDIS_PORT_QUEUES:-6381}
      OPTICAL_BRIDGING_ENABLED: ${OPTICAL_BRIDGING_ENABLED:-true}
      OPTICAL_BRIDGE_URL: ${OPTICAL_BRIDGE_URL:-http://host.docker.internal:4000/ar-io/admin/queue-data-item}
      AR_IO_ADMIN_KEY: ${AR_IO_ADMIN_KEY:-}
      SKIP_BALANCE_CHECKS: ${SKIP_BALANCE_CHECKS:-true}
      DATA_ITEM_BUCKET: ${DATA_ITEM_BUCKET:-raw-data-items}
      DATA_ITEM_BUCKET_REGION: ${DATA_ITEM_BUCKET_REGION:-us-east-1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Trusted reverse-proxy hops for client-IP extraction (per-IP free-upload
      # metering). Default 1 = one proxy in front. Set 0 if this container is hit
      # directly (no trusted proxy) so X-Forwarded-For isn't trusted. See .env.sample.
      TRUSTED_PROXY_COUNT: ${TRUSTED_PROXY_COUNT:-1}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - upload-service-data-items:/temp
    depends_on:
      - upload-service-pg
      - redis
      - redis-queues
      - minio

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis-queues:
    image: redis:7.2-alpine
    container_name: redis-queues
    restart: unless-stopped
    ports:
      - "6381:6381"
    command: ["redis-server", "--port", "6381"]
    volumes:
      - redis-queues-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: upload-service-minio
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: upload-service-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing minio/raw-data-items;
      mc mb --ignore-existing minio/backup-data-items;
      mc anonymous set download minio/raw-data-items;
      mc anonymous set download minio/backup-data-items;
      echo 'MinIO buckets created successfully';
      "

# fulfillment-service removed - replaced by BullMQ workers managed by PM2
  # See ecosystem.config.js for worker configuration

  upload-service-pg:
    image: postgres:16.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Create the upload_service DB up front — the migrator containers that used
      # to do this were removed; the test-runner only runs migrations, not DB
      # creation.
      POSTGRES_DB: upload_service
    ports:
      - "5432:5432"
    volumes:
      - upload-service-data:/var/lib/postgresql/data

# localstack removed - AWS services replaced with self-hosted alternatives:
  # - S3 → MinIO
  # - SQS → BullMQ (Redis)
  # - DynamoDB → PostgreSQL
  # - Secrets Manager/SSM → Environment variables + PostgreSQL config table

  arlocal:
    profiles:
      - test
    image: textury/arlocal:v1.1.35
    ports:
      - "1984:1984"

  test-runner:
    profiles:
      - test
    build:
      # Build from the monorepo root so the install sees the root lockfile,
      # .yarnrc.yml and .yarn/ — required for a COMPLETE dependency tree
      # (root-hoisted deps like bitcoinjs-lib are dropped by a package-local
      # install). See tests/integration.Dockerfile.
      context: ../..
      dockerfile: packages/upload-service/tests/integration.Dockerfile
      args:
        # Codebase requires Node 22 (@ar.io/sdk v4 is ESM-only; engines >=22.12).
        # Literal (not ${...}) so the ambient .env can't change the test Node.
        NODE_VERSION: "22.22.0"
    # IMPORTANT: every value here is a LITERAL, not a ${VAR:-default}
    # interpolation. Docker Compose auto-loads the project `.env` (here a symlink
    # to the live repo-root .env) and substitutes it into ${...} references — which
    # would leak the dev box's localhost infra pointers AND its MAINNET x402 config
    # (real payTo, X402_NETWORK=base) into the test harness. Literals make the
    # harness hermetic: the suite always talks to the in-compose services and never
    # touches mainnet. This is the single source of truth for the docker test env.
    environment:
      DB_HOST: upload-service-pg
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      UPLOAD_DB_DATABASE: upload_service
      DISABLE_LOGS: "false"
      LOG_LEVEL: error
      NODE_ENV: test
      # Bundle-signing + raw-data-item signing wallets (stub test JWK), mirroring
      # .env.test. Absolute paths so they resolve regardless of the process CWD
      # (constants.ts reads TURBO_JWK_FILE at module load).
      TURBO_JWK_FILE: /usr/src/app/packages/upload-service/tests/stubFiles/testWallet.json
      RAW_DATA_ITEM_JWK_FILE: /usr/src/app/packages/upload-service/tests/stubFiles/testWallet.json
      # Node 22.18+ enables native TS type-stripping, which intercepts .ts before
      # ts-node (mocha .mocharc) can transpile testSetup.ts. Disable it so ts-node
      # stays authoritative (same fix as the unit-test CI job).
      NODE_OPTIONS: --no-experimental-strip-types
      # x402 config so createServer()'s validateX402Config passes. TESTNET only —
      # never mainnet/CDP from the harness. Dummy payTo (never moves funds).
      X402_PAYMENT_ADDRESS: "0x0000000000000000000000000000000000000001"
      X402_NETWORK: base-sepolia
      X402_BASE_ENABLED: "false"
      X402_BASE_TESTNET_ENABLED: "true"
      X402_FACILITATOR_URL_BASE_TESTNET: https://x402.org/facilitator
      # Infra: point at the in-compose service hostnames (NOT localhost).
      ARWEAVE_GATEWAY: http://arlocal:1984
      # Make testSetup wait for arlocal's HTTP server before the suite (its
      # container starts before its routes are live). Integration-only — the
      # shared testSetup skips this in unit runs that have no arlocal.
      WAIT_FOR_ARWEAVE_GATEWAY: "true"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      ELASTICACHE_HOST: redis
      ELASTICACHE_NO_CLUSTERING: "true"
      # BullMQ queues (SQS removed)
      REDIS_HOST: redis-queues
      REDIS_PORT_QUEUES: "6381"
      # MinIO (S3-compatible storage)
      DATA_ITEM_BUCKET: raw-data-items
      DATA_ITEM_BUCKET_REGION: us-east-1
      BACKUP_DATA_ITEM_BUCKET: backup-data-items
      # Integration tests inject a STUBBED payment service into createServer and
      # assert real balance-enforcement behavior (reserve/refund/reject), so
      # balance checks must stay ON — SKIP_BALANCE_CHECKS=true would short-circuit
      # the payment path and make rejection tests pass through. The stubbed
      # paymentService means no real outbound calls are made. Optical bridging is
      # OFF so receipts carry the expected fastFinalityIndexes=[] (the dedicated
      # optical suite is the excluded e2e ario spec).
      PAYMENT_SERVICE_BASE_URL: ""
      SKIP_BALANCE_CHECKS: "false"
      OPTICAL_BRIDGING_ENABLED: "false"
    depends_on:
      upload-service-pg:
        condition: service_started
      arlocal:
        condition: service_started
      redis:
        condition: service_healthy
      redis-queues:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  upload-service-data:
  upload-service-data-items:
  redis-data:
  redis-queues-data:
  minio-data:

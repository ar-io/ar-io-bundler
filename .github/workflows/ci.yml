# Continuous Integration for the AR.IO Bundler monorepo.
#
# Runs on every pull request and on pushes to master. Uses the root-level
# Yarn scripts which fan out across the workspaces via the workspace-tools
# plugin (yarn workspaces foreach). Workspaces that do not define a given
# script (e.g. admin-service has no build/lint/typecheck/test:unit) are
# skipped automatically by `foreach run`.
name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Postgres for the DB-coupled unit tests (payment-service pricing specs seed
    # adjustment catalogs). A fresh service container per run = a clean DB, so
    # the seed/duplicate-key flakiness from a dirty shared DB can't happen here.
    # Unit tests need ONLY Postgres — no Redis/MinIO.
    services:
      postgres:
        image: postgres:16.1
        env:
          POSTGRES_USER: turbo_admin
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turbo_admin -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # Single source of truth for the test env. DB creds match docker-compose /
    # init-databases.sql. The dummy X402_PAYMENT_ADDRESS / SOLANA_ADDRESS satisfy
    # the payment-service module-load config validation (constants.ts) during
    # migrations and unit tests — they never move real funds.
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: turbo_admin
      DB_PASSWORD: postgres
      PAYMENT_DB_DATABASE: payment_service
      UPLOAD_DB_DATABASE: upload_service
      X402_PAYMENT_ADDRESS: "0x0000000000000000000000000000000000000001"
      SOLANA_ADDRESS: "11111111111111111111111111111111"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node version is sourced from .nvmrc (currently v22.22.0).
      # NOTE: do NOT use setup-node's `cache: yarn` — it shells out to the
      # runner's global Yarn 1.x before Corepack is enabled, which errors on the
      # `packageManager: yarn@3.6.0` field. We enable Corepack first, then cache
      # Yarn's global folder manually.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Yarn 3.6.0 is pinned via packageManager; corepack activates it.
      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      # Root script: `yarn workspaces foreach -pt run build`.
      - name: Build
        run: yarn build

      # Root script: `yarn workspaces foreach -pt run typecheck`.
      # BLOCKING: both services typecheck clean (incl. test files; the one
      # genuinely-dead integration spec is quarantined to tests/*.disabled).
      - name: Typecheck
        run: yarn typecheck

      # Root `lint` maps to each workspace's `lint:check` (eslint).
      # BLOCKING: zero lint ERRORS across both services (warnings don't fail).
      - name: Lint
        run: yarn lint

      # Create both databases on the fresh Postgres service (the compose
      # init-databases.sql is not auto-mounted into a GH Actions service
      # container), then migrate the payment DB — the only one the unit tests
      # touch. PGPASSWORD lets psql auth non-interactively.
      - name: Create databases
        run: psql -h localhost -U turbo_admin -d postgres -f infrastructure/postgres/init-databases.sql
        env:
          PGPASSWORD: postgres

      - name: Migrate payment DB
        run: yarn db:migrate:payment

      # Root script: `yarn workspaces foreach -pt run test:unit`.
      # BLOCKING: upload-service specs are pure unit (no infra); payment-service
      # specs run against the migrated Postgres above. Green at 195 + 195.
      - name: Unit tests
        run: yarn test:unit

# Build and publish service container images to the GitHub Container Registry.
#
# Triggers:
#   * pushing a version tag (v*)  -> builds and pushes tagged + sha images
#   * manual workflow_dispatch     -> on-demand builds (e.g. from main)
#
# Images:
#   ghcr.io/ar-io/ar-io-bundler-payment          (packages/payment-service/Dockerfile)
#   ghcr.io/ar-io/ar-io-bundler-upload           (packages/upload-service/Dockerfile)
#   ghcr.io/ar-io/ar-io-bundler-upload-migration (packages/upload-service/Dockerfile.migration)
#
# Build context: each service Dockerfile does `COPY . . && yarn && yarn build`
# and expects a single, self-contained package (no @ar-io-bundler/* workspace
# deps), so the build CONTEXT is the package directory, not the repo root.
# This matches the convention already used in docker-compose.yml
# (context: ./packages/<service>).
#
# The Dockerfiles now default to Node 22 (.nvmrc v22.22.0, engines >=22.12;
# @ar.io/sdk v4 is ESM-only). We still pass NODE_VERSION / NODE_VERSION_SHORT
# as build-args below so the published image version is pinned centrally and
# can be bumped from one place.
name: Docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ghcr.io/<owner>/ar-io-bundler-<service>
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ar-io-bundler
  NODE_VERSION: "22.14.0"
  NODE_VERSION_SHORT: "22"

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: payment
            context: packages/payment-service
            dockerfile: packages/payment-service/Dockerfile
          - name: upload
            context: packages/upload-service
            dockerfile: packages/upload-service/Dockerfile
          - name: upload-migration
            context: packages/upload-service
            dockerfile: packages/upload-service/Dockerfile.migration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags/labels. On a v* tag push this yields the version tag
      # (and `latest` for non-prerelease semver); always includes the sha.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            NODE_VERSION_SHORT=${{ env.NODE_VERSION_SHORT }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
